environmentLabel=Environment
environmentTooltip=Which Heista environment this shop talks to. Use Production unless you are running an integration test against the dev platform.
environmentProduction=Production
environmentDevelopment=Development

apiKeyLabel=API key
apiKeyTooltip=Your sm_live_... API key issued from the Heista dashboard.

callbackSecretLabel=Callback secret
callbackSecretTooltip=Random 32-byte hex token. Sent to the platform on every submit and verified on the inbound webhook.

devApiBaseUrlOverrideLabel=Dev API base URL override
devApiBaseUrlOverrideTooltip=Internal use only. When environment is set to Development and this field is filled, the plugin talks to this URL instead of the built-in dev host (e.g. an ngrok tunnel like https://example.ngrok-free.dev). Leave empty in production.

devN8nEndpointOverrideLabel=Dev n8n endpoint override
devN8nEndpointOverrideTooltip=Internal use only. When set, the platform routes this shop's address checks to an alternate n8n webhook (e.g. "address-check-2") instead of the default workflow. Allowed characters: lowercase letters, digits, and dashes. Leave empty in production.

statusOnVerifiedLabel=Status when address verified (no change)
statusOnVerifiedTooltip=Plenty order status ID to set when the address was confirmed and nothing had to be changed — ready to ship, no action needed (e.g. 5.1, 7, 8). Find IDs under System → Orders → Status. Leave empty to keep the order's current status.

statusOnCorrectedLabel=Status when address corrected
statusOnCorrectedTooltip=Plenty order status ID to set when one or more fields were corrected and the result was confirmed. The original address is kept as an internal order comment. Leave empty to keep the order's current status.

statusOnReviewSuggestedLabel=Status when review suggested
statusOnReviewSuggestedTooltip=Plenty order status ID to set when the address was cleaned and applied but the street could not be confirmed — glance at it before shipping. Leave empty to keep the order's current status.

statusOnUndeliverableLabel=Status when address undeliverable
statusOnUndeliverableTooltip=Plenty order status ID to set when the address could not be found and was NOT changed — contact the customer or fix it manually. Leave empty to keep the order's current status.

statusOnPostnumberInvalidLabel=Status when post number invalid
statusOnPostnumberInvalidTooltip=Plenty order status ID to set for a Packstation/Postfiliale whose post number is invalid (not 6–10 digits) — request a valid post number from the customer. Leave empty to keep the order's current status.

statusOnEmailRequiredLabel=Status when email required (DPD)
statusOnEmailRequiredTooltip=Plenty order status ID to set when the carrier requires a customer email but none is present (e.g. DPD). The address is NOT applied until an email exists — request one from the customer. The plugin reads the email from the delivery address, falling back to the billing address. Leave empty to keep the order's current status.

statusOnErrorLabel=Status on processing error
statusOnErrorTooltip=Plenty order status ID to set when the check itself failed (no result returned, timeout, internal error) — this is on us, retry rather than chasing the customer. Leave empty to keep the order's current status.

commentAuthorUserIdLabel=Order comment author (user ID)
commentAuthorUserIdTooltip=Plenty user ID under which the plugin posts the internal "original address before correction" order comment. Find the ID under Setup → Settings → User → Accounts. Leave empty to skip comment creation.

dhlProfileIdsLabel=DHL shipping-profile IDs
dhlProfileIdsTooltip=Comma-separated list of your Plenty shipping-profile IDs that ship with DHL, e.g. 1,2,5. Find IDs under Setup → Orders → Shipping → Shipping profiles. Addresses on these profiles use the DHL-tuned correction prompt. Leave empty if unused.

dpdProfileIdsLabel=DPD shipping-profile IDs
dpdProfileIdsTooltip=Comma-separated list of your Plenty shipping-profile IDs that ship with DPD, e.g. 3,7. Find IDs under Setup → Orders → Shipping → Shipping profiles. Addresses on these profiles use the DPD-tuned correction prompt. Profiles not listed under any carrier use the generic correction prompt. Leave empty if unused.
