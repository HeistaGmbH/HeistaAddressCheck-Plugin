environmentLabel=Umgebung
environmentTooltip=Welche Heista-Umgebung dieser Shop anspricht. "Produktion" verwenden, sofern nicht gegen die Dev-Plattform getestet wird.
environmentProduction=Produktion
environmentDevelopment=Entwicklung

apiKeyLabel=API-Schlüssel
apiKeyTooltip=Dein sm_live_...-API-Schlüssel aus dem Heista-Dashboard.

callbackSecretLabel=Callback-Geheimnis
callbackSecretTooltip=Zufälliger 32-Byte-Hex-Token. Wird beim Senden an die Plattform mitgegeben und beim eingehenden Webhook verifiziert.

devApiBaseUrlOverrideLabel=Dev-API-Basis-URL überschreiben
devApiBaseUrlOverrideTooltip=Nur für internen Gebrauch. Wenn die Umgebung auf Entwicklung steht und dieses Feld gefüllt ist, spricht das Plugin diese URL statt des eingebauten Dev-Hosts an (z. B. ein ngrok-Tunnel wie https://example.ngrok-free.dev). In der Produktion leer lassen.

devN8nEndpointOverrideLabel=Dev-n8n-Endpoint überschreiben
devN8nEndpointOverrideTooltip=Nur für internen Gebrauch. Wenn gesetzt, leitet die Plattform die Adressprüfungen dieses Shops an einen alternativen n8n-Webhook (z. B. "address-check-2") statt an den Standard-Workflow. Erlaubte Zeichen: Kleinbuchstaben, Ziffern und Bindestriche. In der Produktion leer lassen.

statusOnVerifiedLabel=Status bei bestätigter Adresse (ohne Änderung)
statusOnVerifiedTooltip=Plenty-Auftragsstatus-ID, die gesetzt wird, wenn die Adresse bestätigt wurde und nichts geändert werden musste — versandbereit, keine Aktion nötig (z. B. 5.1, 7, 8). IDs findest du unter System → Aufträge → Status. Leer lassen, um den aktuellen Status nicht zu ändern.

statusOnCorrectedLabel=Status bei korrigierter Adresse
statusOnCorrectedTooltip=Plenty-Auftragsstatus-ID, die gesetzt wird, wenn ein oder mehrere Felder korrigiert wurden und das Ergebnis bestätigt wurde. Die Originaladresse wird als interner Auftragskommentar gespeichert. Leer lassen, um den aktuellen Status nicht zu ändern.

statusOnReviewSuggestedLabel=Status bei empfohlener Prüfung
statusOnReviewSuggestedTooltip=Plenty-Auftragsstatus-ID, die gesetzt wird, wenn die Adresse bereinigt und übernommen wurde, die Straße aber nicht eindeutig bestätigt werden konnte — vor dem Versand kurz prüfen. Leer lassen, um den aktuellen Status nicht zu ändern.

statusOnUndeliverableLabel=Status bei nicht zustellbarer Adresse
statusOnUndeliverableTooltip=Plenty-Auftragsstatus-ID, die gesetzt wird, wenn die Adresse nicht gefunden und NICHT geändert wurde — Kunden kontaktieren oder manuell korrigieren. Leer lassen, um den aktuellen Status nicht zu ändern.

statusOnPostnumberInvalidLabel=Status bei ungültiger Postnummer
statusOnPostnumberInvalidTooltip=Plenty-Auftragsstatus-ID, die für eine Packstation/Postfiliale mit ungültiger Postnummer (nicht 6–10 Ziffern) gesetzt wird — eine gültige Postnummer beim Kunden anfordern. Leer lassen, um den aktuellen Status nicht zu ändern.

statusOnEmailRequiredLabel=Status bei fehlender E-Mail (DPD)
statusOnEmailRequiredTooltip=Plenty-Auftragsstatus-ID, die gesetzt wird, wenn der Versanddienstleister eine E-Mail-Adresse benötigt, aber keine vorhanden ist (z. B. DPD). Die Adresse wird NICHT übernommen, bis eine E-Mail vorliegt — beim Kunden anfordern. Das Plugin liest die E-Mail aus der Lieferadresse, ersatzweise aus der Rechnungsadresse. Leer lassen, um den aktuellen Status nicht zu ändern.

statusOnErrorLabel=Status bei Verarbeitungsfehler
statusOnErrorTooltip=Plenty-Auftragsstatus-ID, die gesetzt wird, wenn die Prüfung selbst fehlgeschlagen ist (kein Ergebnis, Timeout, interner Fehler) — liegt an uns, eher erneut versuchen als den Kunden kontaktieren. Leer lassen, um den aktuellen Status nicht zu ändern.

commentAuthorUserIdLabel=Auftragskommentar-Autor (Benutzer-ID)
commentAuthorUserIdTooltip=Plenty-Benutzer-ID, unter der das Plugin den internen Kommentar "Originaladresse vor Korrektur" am Auftrag anlegt. Die ID findest du unter Einrichtung → Einstellungen → Benutzer → Konten. Leer lassen, um keinen Kommentar anzulegen.

dhlProfileIdsLabel=DHL-Versandprofil-IDs
dhlProfileIdsTooltip=Kommagetrennte Liste deiner Plenty-Versandprofil-IDs, die mit DHL versendet werden, z. B. 1,2,5. IDs findest du unter Einrichtung → Aufträge → Versand → Versandprofile. Adressen dieser Profile nutzen den DHL-optimierten Korrektur-Prompt. Leer lassen, wenn nicht verwendet.

dpdProfileIdsLabel=DPD-Versandprofil-IDs
dpdProfileIdsTooltip=Kommagetrennte Liste deiner Plenty-Versandprofil-IDs, die mit DPD versendet werden, z. B. 3,7. IDs findest du unter Einrichtung → Aufträge → Versand → Versandprofile. Adressen dieser Profile nutzen den DPD-optimierten Korrektur-Prompt. Profile, die keinem Dienstleister zugeordnet sind, nutzen den generischen Korrektur-Prompt. Leer lassen, wenn nicht verwendet.
